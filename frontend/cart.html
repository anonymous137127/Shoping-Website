<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Cart — Market</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<a href="#main" class="skip-link">Skip to content</a>
<div id="headerMount"></div>

<main id="main" class="section">
  <div class="container">
    <div class="section-head"><h2>Your Cart</h2></div>
    <div id="cartMount"></div>
  </div>
</main>

<div id="footerMount"></div>

<script src="js/data.js"></script>
<script src="js/icons.js"></script>
<script src="js/main.js"></script>
<script>
  function renderCartPage() {
    const cart = getCart();
    const ids = Object.keys(cart);
    const mount = document.getElementById("cartMount");

    if (ids.length === 0) {
      mount.innerHTML = `<div class="empty-state"><h3>Your cart is empty</h3><p>Explore our catalog and find something you like.</p><a href="shop.html" class="btn btn-primary">Browse products</a></div>`;
      return;
    }

    let subtotal = 0;
    const itemsHTML = ids.map(id => {
      const p = getProductById(id);
      if (!p) return "";
      const lineTotal = p.price * cart[id];
      subtotal += lineTotal;
      return `
      <div class="cart-item">
        <div class="cart-item-thumb">${productIcon(p.img)}</div>
        <div>
          <div class="cart-item-name">${p.name}</div>
          <div class="sku">SKU ${p.id}</div>
          <a class="remove-link" onclick="removeFromCart('${p.id}')" role="button" tabindex="0">Remove</a>
        </div>
        <div class="qty-control">
          <button onclick="updateLine('${p.id}', -1)" aria-label="Decrease quantity">${ICONS.minus}</button>
          <span>${cart[id]}</span>
          <button onclick="updateLine('${p.id}', 1)" aria-label="Increase quantity">${ICONS.plus}</button>
        </div>
        <div style="font-family:'IBM Plex Mono',monospace; font-weight:600;">${formatINR(lineTotal)}</div>
      </div>`;
    }).join("");

    const shipping = subtotal > 499 || subtotal === 0 ? 0 : 49;
    const total = subtotal + shipping;

    mount.innerHTML = `
      <div class="cart-layout">
        <div>${itemsHTML}</div>
        <div class="summary-box">
          <h3 style="margin-bottom:18px;">Order Summary</h3>
          <div class="summary-row"><span>Subtotal</span><span>${formatINR(subtotal)}</span></div>
          <div class="summary-row"><span>Delivery</span><span>${shipping === 0 ? "Free" : formatINR(shipping)}</span></div>
          <div class="summary-total"><span>Total</span><span>${formatINR(total)}</span></div>
          <button class="btn btn-primary btn-block" onclick="showToast('This is a demo — checkout is not connected to payments.')">Proceed to Checkout</button>
        </div>
      </div>`;
  }

  function updateLine(id, delta) {
    const cart = getCart();
    setCartQty(id, (cart[id] || 0) + delta);
    renderCartPage();
  }

  document.addEventListener("DOMContentLoaded", renderCartPage);
</script>
</body>
</html>
