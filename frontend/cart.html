<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Your Cart - Market</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<a href="#main" class="skip-link">

Skip to content

</a>

<div id="headerMount"></div>

<main id="main" class="section">

<div class="container">

<div class="section-head">

<h2>Your Cart</h2>

</div>

<div id="cartMount"></div>

</div>

</main>

<div id="footerMount"></div>

<script src="js/config.js"></script>
<script src="js/data.js"></script>
<script src="js/icons.js"></script>
<script src="js/navbar.js"></script>
<script src="js/footer.js"></script>
<script src="js/main.js"></script>

<script>

function renderCartPage(){

const cart=getCart();

const ids=Object.keys(cart);

const mount=document.getElementById("cartMount");

if(ids.length===0){

mount.innerHTML=`

<div class="empty-state">

<h3>

Your cart is empty

</h3>

<p>

Explore our catalog and find something you like.

</p>

<a href="shop.html" class="btn btn-primary">

Browse Products

</a>

</div>

`;

return;

}

let subtotal=0;

const itemsHTML=ids.map(id=>{

const p=getProductById(id);

if(!p) return "";

const qty=cart[id];

const lineTotal=p.price*qty;

subtotal+=lineTotal;

return`

<div class="cart-item">

<div class="cart-item-thumb">

${productIcon(p.img)}

</div>

<div>

<div class="cart-item-name">

${p.name}

</div>

<div class="sku">

SKU ${p.id}

</div>

<a

class="remove-link"

href="#"

onclick="removeItem('${p.id}')">

Remove

</a>

</div>

<div class="qty-control">

<button onclick="updateQty('${p.id}',-1)">

${ICONS.minus}

</button>

<span>

${qty}

</span>

<button onclick="updateQty('${p.id}',1)">

${ICONS.plus}

</button>

</div>

<div style="font-weight:bold;">

${formatINR(lineTotal)}

</div>

</div>

`;

}).join("");

const shipping=subtotal>499?0:49;

const total=subtotal+shipping;

mount.innerHTML=`

<div class="cart-layout">

<div>

${itemsHTML}

</div>

<div class="summary-box">

<h3>

Order Summary

</h3>

<div class="summary-row">

<span>

Subtotal

</span>

<span>

${formatINR(subtotal)}

</span>

</div>

<div class="summary-row">

<span>

Shipping

</span>

<span>

${shipping===0?"Free":formatINR(shipping)}

</span>

</div>

<hr>

<div class="summary-total">

<span>

Total

</span>

<span>

${formatINR(total)}

</span>

</div>

<br>

<button

class="btn btn-primary btn-block"

onclick="goCheckout()">

Proceed To Checkout

</button>

</div>

</div>

`;

}

function updateQty(id,change){

const cart=getCart();

let qty=(cart[id]||0)+change;

if(qty<=0){

delete cart[id];

}else{

cart[id]=qty;

}

saveCart(cart);

renderCartPage();

}

function removeItem(id){

const cart=getCart();

delete cart[id];

saveCart(cart);

renderCartPage();

}

function goCheckout(){

const cart=getCart();

if(Object.keys(cart).length===0){

alert("Your cart is empty.");

return;

}

window.location.href="checkout.html";

}

document.addEventListener(

"DOMContentLoaded",

renderCartPage

);

</script>

</body>

</html>
