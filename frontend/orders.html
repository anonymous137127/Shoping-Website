<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Orders - Market</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/profile.css">
<link rel="stylesheet" href="css/responsive.css">
<link rel="stylesheet" href="css/animations.css">
<link rel="stylesheet" href="css/orders.css">

</head>

<body>

<a href="#main" class="skip-link">Skip to content</a>

<div id="headerMount"></div>

<main id="main" class="section">

<div class="container">

<h1 class="orders-title">My Orders</h1>

<div id="ordersContainer">

<div class="orders-loading">

<span class="loader-spinner"></span>

Loading your orders...

</div>

</div>

</div>

</main>

<div id="footerMount"></div>

<script src="js/main.js"></script>

<script>

const API_URL="https://shopping-backend-s8l8.onrender.com/api";

const token=localStorage.getItem("token");

if(!token){

window.location="login.html";

}

loadOrders();

function statusClass(status){

const s=(status||"").toLowerCase();

if(s==="pending") return "status-pending";

if(s==="delivered") return "status-delivered";

if(s==="cancelled") return "status-cancelled";

if(s==="shipped" || s==="processing") return "status-processing";

return "status-default";

}

async function loadOrders(){

try{

const response=await fetch(

`${API_URL}/orders/`,

{

headers:{

Authorization:"Bearer "+token

}

}

);

const data=await response.json();

const container=document.getElementById("ordersContainer");

if(!data.success || data.orders.length===0){

container.innerHTML=`

<div class="empty-state">

<h3>No Orders Found</h3>

<p>Your orders will appear here.</p>

<a href="shop.html" class="btn btn-primary">

Start Shopping

</a>

</div>

`;

return;

}

let html="";

data.orders.forEach((order,index)=>{

html+=`

<div class="order-card" style="animation-delay:${index * 0.07}s">

<div class="order-card-top">

<div>

<h3 class="order-id-label">Order ID</h3>

<p class="order-id-value">${order._id}</p>

</div>

<span class="status-badge ${statusClass(order.status)}">

${order.status}

</span>

</div>

<hr>

<div class="order-meta-grid">

<p>

<strong>Total :</strong>

<span>₹${order.total}</span>

</p>

<p>

<strong>Payment :</strong>

<span>${order.payment_method}</span>

</p>

<p>

<strong>Date :</strong>

<span>${new Date(order.ordered_at).toLocaleString()}</span>

</p>

<p class="order-address">

<strong>Address :</strong>

<span>${order.address}</span>

</p>

</div>

<h4 class="order-products-heading">

Products

</h4>

<ul class="order-products-list">

${order.products.map(product=>`

<li>

<span class="op-name">${product.name}</span>

<span class="op-qty">× ${product.quantity}</span>

<span class="op-price">₹${product.subtotal}</span>

</li>

`).join("")}

</ul>

${
order.status==="Pending"

?

`

<button

class="btn btn-danger order-cancel-btn"

onclick="cancelOrder('${order._id}')">

Cancel Order

</button>

`

:

""

}

</div>

`;

});

container.innerHTML=html;

}

catch(error){

console.log(error);

document.getElementById("ordersContainer").innerHTML=`

<div class="empty-state">

<h3>

Unable to load orders.

</h3>

</div>

`;

}

}

async function cancelOrder(id){

if(!confirm("Cancel this order?")) return;

try{

const response=await fetch(

`${API_URL}/orders/cancel/${id}`,

{

method:"PUT",

headers:{

Authorization:"Bearer "+token

}

}

);

const data=await response.json();

alert(data.message);

loadOrders();

}

catch(error){

alert("Unable to cancel order.");

}

}

</script>

</body>

</html>
