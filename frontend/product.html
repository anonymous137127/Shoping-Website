<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product — Market</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<a href="#main" class="skip-link">Skip to content</a>
<div id="headerMount"></div>

<main id="main" class="section">
  <div class="container" id="pdpMount"></div>

  <div class="container" style="margin-top:56px;">
    <div class="section-head"><h2>You may also like</h2></div>
    <div class="product-grid" id="relatedGrid"></div>
  </div>
</main>

<div id="footerMount"></div>

<script src="js/data.js"></script>
<script src="js/icons.js"></script>
<script src="js/main.js"></script>
<script>
  const id = new URLSearchParams(window.location.search).get("id");
  const p = getProductById(id);
  let qty = 1;

  function renderPDP() {
    if (!p) {
      document.getElementById("pdpMount").innerHTML = `<div class="empty-state"><h3>Product not found</h3><p>It may have been removed or the link is incorrect.</p><a href="shop.html" class="btn btn-primary">Back to shop</a></div>`;
      return;
    }
    document.title = p.name + " — Market";
    const off = Math.round((1 - p.price / p.mrp) * 100);
    document.getElementById("pdpMount").innerHTML = `
      <div class="pdp">
        <div class="pdp-gallery" aria-hidden="true" style="transform:scale(2.2);">${productIcon(p.img)}</div>
        <div class="pdp-info">
          <span class="product-cat">${categoryName(p.category)}</span>
          <h1>${p.name}</h1>
          <div class="pdp-meta">
            <span class="product-rating">${renderStars(p.rating)} ${p.rating} <span class="count">(${p.reviews.toLocaleString("en-IN")} reviews)</span></span>
            <span>·</span>
            <span class="sku">SKU ${p.id}</span>
            <span>·</span>
            <span>${p.stock > 10 ? "In stock" : `Only ${p.stock} left`}</span>
          </div>
          <div class="pdp-price-block">
            <span class="pdp-price-now">${formatINR(p.price)}</span>
            <span class="price-mrp">${formatINR(p.mrp)}</span>
            <span class="price-off" style="margin-left:10px;">${off}% OFF</span>
          </div>
          <p class="pdp-desc">${p.desc}</p>
          <div class="qty-row">
            <span style="font-size:14px; font-weight:600;">Quantity</span>
            <div class="qty-control">
              <button onclick="changeQty(-1)" aria-label="Decrease quantity">${ICONS.minus}</button>
              <span id="qtyVal">1</span>
              <button onclick="changeQty(1)" aria-label="Increase quantity">${ICONS.plus}</button>
            </div>
          </div>
          <div class="pdp-actions">
            <button class="btn btn-primary" onclick="addToCart('${p.id}', qty); ">Add to Cart</button>
            <a href="cart.html" class="btn btn-ghost">Buy Now</a>
          </div>
          <div class="trust-row">
            <div class="trust-item">${ICONS.truck}Free delivery over ₹499</div>
            <div class="trust-item">${ICONS.refresh}7-day easy returns</div>
            <div class="trust-item">${ICONS.shield}Secure checkout</div>
          </div>
        </div>
      </div>`;

    document.getElementById("relatedGrid").innerHTML = PRODUCTS
      .filter(rp => rp.category === p.category && rp.id !== p.id)
      .slice(0, 4)
      .map(productCardHTML)
      .join("");
  }

  function changeQty(delta) {
    qty = Math.max(1, qty + delta);
    document.getElementById("qtyVal").textContent = qty;
  }

  renderPDP();
</script>
</body>
</html>
