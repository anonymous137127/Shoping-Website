<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Admin Payments - Market</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/admin-payments.css">

</head>

<body class="admin-terminal">

<div id="headerMount"></div>

<main class="section">

<div class="container">

<div class="admin-header">

<h1>

<span class="terminal-prompt">root@market:~$</span> Payment Management

</h1>

<p>

Approve or Reject Customer Payments

</p>

</div>

<div class="table-wrap">

<table class="table admin-table">

<thead>

<tr>

<th>Order ID</th>

<th>Customer</th>

<th>Amount</th>

<th>Payment</th>

<th>Status</th>

<th>Action</th>

</tr>

</thead>

<tbody id="paymentTable">

<tr>

<td colspan="6" class="loading-row">

<span class="loader-dots">Loading payments<span>.</span><span>.</span><span>.</span></span>

</td>

</tr>

</tbody>

</table>

</div>

</div>

</main>

<div id="footerMount"></div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/navbar.js"></script>
<script src="js/footer.js"></script>
<script src="js/main.js"></script>

<script>

const API=

"https://shopping-backend-s8l8.onrender.com/api/admin/payment";

loadPayments();

function statusBadgeClass(status){

const s=(status||"").toLowerCase();

if(s==="pending") return "badge-pending";

if(s==="approved") return "badge-approved";

if(s==="rejected") return "badge-rejected";

if(s==="shipped") return "badge-shipped";

if(s==="delivered") return "badge-delivered";

return "badge-default";

}

async function loadPayments(){

const res=await fetch(API);

const data=await res.json();

const table=document.getElementById("paymentTable");

table.innerHTML="";

data.payments.forEach(order=>{

table.innerHTML+=`

<tr>

<td class="cell-id">

${order.order_id}

</td>

<td>

${order.customer}

</td>

<td class="cell-amount">

₹${order.amount}

</td>

<td>

<span class="badge ${statusBadgeClass(order.payment_status)}">

${order.payment_status}

</span>

</td>

<td>

<span class="badge ${statusBadgeClass(order.order_status)}">

${order.order_status}

</span>

</td>

<td class="cell-actions">

<button

onclick="approve('${order.order_id}')"

class="btn btn-success btn-term">

✓ Approve

</button>

<button

onclick="reject('${order.order_id}')"

class="btn btn-danger btn-term">

✕ Reject

</button>

<button

onclick="ship('${order.order_id}')"

class="btn btn-term btn-term-neutral">

▶ Ship

</button>

<button

onclick="deliver('${order.order_id}')"

class="btn btn-term btn-term-neutral">

■ Deliver

</button>

</td>

</tr>

`;

});

}

async function approve(id){

await fetch(

API+"/approve/"+id,

{

method:"PUT"

}

);

loadPayments();

}

async function reject(id){

await fetch(

API+"/reject/"+id,

{

method:"PUT"

}

);

loadPayments();

}

async function ship(id){

await fetch(

API+"/ship/"+id,

{

method:"PUT"

}

);

loadPayments();

}

async function deliver(id){

await fetch(

API+"/deliver/"+id,

{

method:"PUT"

}

);

loadPayments();

}

</script>

</body>

</html>
